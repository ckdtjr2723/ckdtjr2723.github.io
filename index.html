<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 캘린더 대시보드</title>
    <!-- 폰트: Pretendard (최적화된 모던 한국어/영문 렌더링 폰트) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <!-- FullCalendar Scheduler JS ( Timeline View ) -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.10/index.global.min.js"></script>
    
    <!-- Firebase SDK (Compat Version for Vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- 아이콘 폰트 추가 (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="index.css?v=37">
</head>
<body>
    <div class="app-container">
        <!-- 사이드바 (프로젝트 리스트 및 필터) -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo"></div>
                <h1>프로젝트 매니저</h1>
            </div>
            
            <button id="addEventBtn" class="btn-primary">
                새 일정 추가 <span>+</span>
            </button>

            <div class="filter-section">
                <div class="filter-header">
                    <h3>캘린더 필터</h3>
                    <button id="manageProjectsBtn" class="text-btn">📝 명칭 편집</button>
                </div>
                <!-- 자바스크립트에서 동적으로 채워집니다 -->
                <ul class="project-list" id="projectListContainer">
                </ul>
            </div>
        </aside>

        <!-- 메인 캘린더 영역 -->
        <main class="main-content">
            <header class="top-nav">
                <button id="toggleSidebarBtn" class="btn-primary" style="margin-right: 1rem; padding: 0.6rem 1rem; font-size: 1rem; background: var(--glass-bg); border: 1px solid var(--glass-border);">
                    <i class="fas fa-bars"></i>
                </button>
                <div style="flex:1;"></div>
                

                
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=8b5cf6&color=fff" alt="User Avatar">
                </div>
            </header>

            <!-- 1. 프로젝트별 월간 요약 캘린더 (서브 캘린더) 상단 배치 -->
            <div class="sub-calendar-wrapper glass-panel" style="margin-bottom: 1.5rem;">
                <div id="subCalendar"></div>
            </div>

            <!-- 2. 주 캘린더 (업무 대시보드) 하단 렌더링 -->
            <div class="calendar-wrapper glass-panel">
                <div id="calendar"></div>
            </div>

            <!-- 3. 할 일 메모 (미정 일정 대체) -->
            <div class="memo-wrapper glass-panel" style="margin-top: 1.5rem; padding: 1.5rem;">
                <h3 style="margin-bottom: 1rem; color: var(--text-primary);"><i class="fas fa-list-ul"></i> 할 일 메모</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap;">
                    <select id="memoProject" style="padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline: none; min-width: 140px; font-family: inherit; font-size: 0.95rem;">
                    </select>
                    <input type="text" id="memoInput" placeholder="아직 캘린더에 넣기 이른 할 일을 메모하세요..." style="flex:1; min-width: 200px; padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline: none; font-family: inherit; font-size: 0.95rem;">
                    <button id="addMemoBtn" class="btn-primary" style="padding: 0 1.5rem; white-space: nowrap;">추가</button>
                </div>
                <ul id="memoList" style="list-style: none; display: flex; flex-direction: column; gap: 8px;">
                    <!-- 동적으로 메모 추가됨 -->
                </ul>
            </div>
        </main>
    </div>

    <!-- 이벤트 추가/수정 모달 -->
    <div id="eventModal" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3 id="modalTitle">새로운 일정 추가</h3>
                <button id="closeModal" class="close-btn">&times;</button>
            </div>
            <form id="eventForm">
                <input type="hidden" id="eventId">
                <input type="hidden" id="pendingMatrixId">
                
                <div class="form-group">
                    <label>일정 제목</label>
                    <input type="text" id="eventTitle" placeholder="예: 메인 페이지 리뉴얼 배포" required>
                </div>
                
                <div class="form-group" id="calendarSelectGroup" style="margin-bottom: 1.2rem;">
                    <label>저장 위치</label>
                    <div class="custom-select">
                        <select id="eventTargetCalendar" required>
                            <option value="main">📌 메인 캘린더</option>
                            <option value="sub">📊 월간 요약 캘린더 (하단)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>카테고리</label>
                        <div class="custom-select">
                            <select id="eventType" required>
                                <option value="회의">🤝 회의</option>
                                <option value="출장">✈️ 출장</option>
                                <option value="평가">📊 평가</option>
                                <option value="납품">🚚 납품</option>
                                <option value="입고">📦 입고</option>
                                <option value="일반">📌 일반 (기타)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>프로젝트 (캘린더 선택)</label>
                        <div class="custom-select">
                            <!-- 자바스크립트에서 동적으로 채워집니다 -->
                            <select id="eventProject" required></select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>시작일</label>
                        <input type="date" id="eventStart" required>
                    </div>
                    <div class="form-group">
                        <label>종료일 (선택)</label>
                        <input type="date" id="eventEnd">
                        <div id="ongoingContainer" style="display:none; align-items:center; gap:6px; margin-top:8px; font-size:0.85rem; color:rgba(255,255,255,0.7); cursor:pointer;">
                            <input type="checkbox" id="eventOngoing" style="accent-color:#8b5cf6; width:14px; height:14px; cursor:pointer;">
                            <span>현재 진행 중</span>
                        </div>
                    </div>
                </div>
                
                <div style="display:flex; gap:20px; align-items:center; margin-bottom: 1.2rem;">
                    <div class="form-group" id="importantInputGroup" style="margin-bottom:0; display:none;">
                        <label class="custom-checkbox" style="color:#facc15; font-weight:bold;">
                            <input type="checkbox" id="eventImportant">
                            <span class="checkmark" style="display:inline-block !important; width:16px !important; height:16px !important; min-width:16px !important; flex-shrink:0; border:2px solid #facc15; border-radius:4px; --checked-bg:#facc15;"></span>
                            ⭐ 중요 일정
                        </label>
                    </div>
                    
                    <div class="form-group" id="holidayInputGroup" style="margin-bottom:0;">
                        <label class="custom-checkbox" style="color:#ef4444; font-weight:bold;">
                            <input type="checkbox" id="eventHoliday">
                            <span class="checkmark" style="display:inline-block !important; width:16px !important; height:16px !important; min-width:16px !important; flex-shrink:0; border:2px solid #ef4444; border-radius:4px; --checked-bg:#ef4444;"></span>
                            🏖️ 공휴일 지정
                        </label>
                    </div>
                </div>
                
                <div class="form-group" id="timeInputGroup" style="margin-bottom: 1.2rem;">
                    <label>지정 시간 (선택)</label>
                    <div class="custom-select">
                        <select id="eventTime">
                            <option value="">지정 안 함</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>상세 내용</label>
                    <textarea id="eventDescription" rows="3" placeholder="일정의 세부적인 사항이나 참고 메모를 입력하세요..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" id="deleteEventBtn" class="btn-danger hidden">삭제</button>
                    <button type="submit" class="btn-primary" style="flex:1;">저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 캘린더 명칭 관리 모달 -->
    <div id="projectManageModal" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3>캘린더 명칭 관리</h3>
                <button id="closeProjModal" class="close-btn">&times;</button>
            </div>
            <div id="projectEditContainer" class="form-group-list">
                <!-- 자바스크립트에서 동적으로 텍스트 인풋이 생성됩니다. -->
            </div>
            <button type="button" id="addNewProjectBtn" class="text-btn" style="margin-bottom: 1.5rem; font-size: 0.95rem;">+ 새로운 카테고리 추가</button>
            <div class="modal-actions">
                <button type="button" id="saveProjectsBtn" class="btn-primary" style="width: 100%;">이름 변경 저장</button>
            </div>
        </div>
    </div>



    <script src="app.js?v=49"></script>
</body>
</html>
